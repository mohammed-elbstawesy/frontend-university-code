<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>VulnCraft — Cybersecurity Scanner</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="VulnCraft — Advanced cybersecurity vulnerability scanner. Protect your digital assets with AI-powered security analysis.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=5">
</head>

<body>
  <!-- SVG Distortion Filter for Liquid Glass -->
  <svg style="display:none;position:absolute" aria-hidden="true">
    <filter id="lg-dist" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
      <feDisplacementMap in="SourceGraphic" in2="blurred" scale="70" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <app-root></app-root>
</body>

</html>
