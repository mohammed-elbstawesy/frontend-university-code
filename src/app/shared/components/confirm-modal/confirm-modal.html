@if (isOpen) {
    <div class="confirm-backdrop animate-fade-in" (click)="handleCancel()">
        <div class="confirm-modal animate-scale-in" (click)="$event.stopPropagation()">
            <!-- Header -->
            <div class="confirm-header" [ngClass]="'header-' + (options.type || 'warning')">
                <div class="confirm-icon-wrap">
                    @if (options.type === 'danger') {
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    } @else if (options.type === 'success') {
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 13l4 4L19 7" />
                        </svg>
                    } @else {
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                    }
                </div>
                <h3 class="confirm-title">{{ options.title }}</h3>
            </div>

            <!-- Body -->
            <div class="confirm-body">
                <p>{{ options.message }}</p>
            </div>

            <!-- Footer -->
            <div class="confirm-footer">
                <button class="btn-cancel" (click)="handleCancel()">
                    {{ options.cancelText || 'Cancel' }}
                </button>
                <button class="btn-confirm" [ngClass]="'btn-' + (options.type || 'warning')" (click)="handleConfirm()">
                    {{ options.confirmText || 'Yes, Proceed' }}
                </button>
            </div>
        </div>
    </div>
}
