<app-navbar></app-navbar>
<section class="page-section active">
  <div class="loading-wrapper">
    <!-- Spinner -->
    <div class="spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-glow"></div>
      <div class="spinner-inner"></div>
    </div>

    <!-- Title -->
    <h2 class="loading-title">Scanning Target...</h2>

    <!-- Status Message -->
    <p class="loading-url">{{ statusMessage }}</p>

    <!-- Progress Bar -->
    <div class="scaning-wait-style-1" >
      <div class="scaning-wait-style-2" >
        <span>SCAN PROGRESS</span>
        <span class="scaning-wait-style-3" >{{ progress }}%</span>
      </div>
      <div class="progress-track scaning-wait-style-4">
        <div class="progress-fill scaning-wait-style-5" [style.width.%]="progress"></div>
      </div>
    </div>

    <!-- Email notice -->
    <div class="scaning-wait-style-6" >
      <p class="scaning-wait-style-7" >
        <svg class="scaning-wait-style-8" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <rect width="20" height="16" x="2" y="4" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
        A detailed report will be sent to your email upon completion.
      </p>
    </div>
  </div>
</section>
