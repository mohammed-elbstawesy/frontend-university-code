<!-- ═══ NAVBAR (Glass) ═══ -->
<nav class="site-navbar" id="site-navbar">
    <div class="glass-filter"></div>
    <div class="glass-overlay"></div>
    <div class="glass-specular"></div>
    <div class="nav-inner">
        <a routerLink="" class="nav-brand" id="nav-brand">
            <div class="nav-brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                    <path d="m9 12 2 2 4-4" />
                </svg>
            </div>
            <div class="nav-brand-text">Vuln<span>Craft</span></div>
        </a>

        <ul class="nav-links" [class.open]="isMobileMenuOpen" id="nav-links">
            <!-- Standalone Routing (commented out to keep single page format)
            <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a></li>
            <li><a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About</a></li>
            <li><a routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()">Services</a></li>
            <li><a routerLink="/pricing" routerLinkActive="active" (click)="closeMobileMenu()">Pricing</a></li>
            -->
            <!-- Single Page Scrolling -->
            <li><a href="#hero" [class.active]="activeSection === 'hero'" (click)="closeMobileMenu()">Home</a></li>
            <li><a href="#about" [class.active]="activeSection === 'about'" (click)="closeMobileMenu()">About</a></li>
            <li><a href="#services" [class.active]="activeSection === 'services'"
                    (click)="closeMobileMenu()">Services</a></li>
            <li><a href="#pricing" [class.active]="activeSection === 'pricing'" (click)="closeMobileMenu()">Pricing</a>
            </li>
        </ul>

        <div class="nav-actions">
            <button class="hamburger" [class.active]="isMobileMenuOpen" id="hamburger-btn" aria-label="Toggle menu"
                (click)="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </button>
            <!-- Auth Buttons -->
            @if(!islogin) {
            <a (click)="routelogin()" class="btn-primary navbar-style-1">Login</a>
            }

            @if(islogin) {
            <!-- User Avatar Button -->
            <button (click)="toggleMenu()" class="btn-ghost nav-avatar-btn">
                <div class="nav-avatar-circle">
                    {{ user?.fristName ? user.fristName[0].toUpperCase() : "U" }}
                </div>
            </button>

            @if(isMenuOpen) {
            <div (click)="closeMenu()" class="nav-dropdown-backdrop"></div>

            <div class="nav-dropdown glass animate-fade-in">
                <div class="glass-filter"></div>
                <div class="glass-overlay"></div>
                <div class="glass-specular"></div>
                <div class="nav-dropdown-content glass-content">
                    <!-- User Info -->
                    <div class="nav-user-info">
                        <div class="nav-user-avatar-wrap">
                            <div class="nav-user-avatar">
                                {{ user?.fristName ? user.fristName[0].toUpperCase() : "U" }}
                            </div>
                            <div class="nav-user-online"></div>
                        </div>
                        <div class="nav-user-text">
                            <div class="nav-user-name">Hi, {{ user?.fristName }}!</div>
                            <div class="nav-user-email">{{ user?.email }}</div>
                        </div>
                        <button (click)="routeProfile()" class="btn-outline nav-manage-btn">
                            Manage your Account
                        </button>
                    </div>

                    <div class="nav-menu-items">
                        @if(cheackuser()) {
                        <button (click)="routeAdmin()" class="btn-ghost nav-menu-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                            Dashboard
                        </button>
                        }
                        <button (click)="routeUrlUser()" class="btn-ghost nav-menu-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                            Your URLs
                        </button>
                        <button (click)="logout()" class="btn-ghost nav-menu-btn nav-logout-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                            Sign out
                        </button>
                    </div>
                </div>
            </div>
            }
            }

            <!-- Mobile Overlay -->
            @if(isMobileMenuOpen) {
            <div class="mobile-overlay" [class.active]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
            }
        </div>
    </div>
</nav>
