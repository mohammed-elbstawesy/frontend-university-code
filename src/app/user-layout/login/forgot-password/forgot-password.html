<section class="page-section active">
    <div class="auth-wrapper">
        <button (click)="backToLogin()" class="back-btn btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Back
        </button>
        <div class="auth-card glass">
            <div class="glass-filter"></div>
            <div class="glass-overlay"></div>
            <div class="glass-specular"></div>
            <div class="glass-content">
                <div class="auth-header">
                    <div class="auth-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect width="20" height="16" x="2" y="4" rx="2" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                    </div>
                    <h2 class="auth-title">Forgot Password?</h2>
                    <p class="auth-subtitle">Enter your email to receive a reset code</p>
                </div>

                <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrap">
                            <div class="input-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect width="20" height="16" x="2" y="4" rx="2" />
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                                </svg>
                            </div>
                            <input formControlName="email" type="email" class="form-input"
                                placeholder="name&#64;example.com">
                        </div>
                    </div>

                    @if (error) {
                    <div class="forgot-error-box">{{ error }}</div>
                    }

                    <button type="submit" [disabled]="forgotForm.invalid || isLoading"
                        class="btn-primary btn-lg forgot-submit" [style.opacity]="forgotForm.invalid ? '0.6' : '1'">
                        {{ isLoading ? 'Sending...' : 'Send Code' }}
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
