<section class="page-section active">
    <div class="auth-wrapper">
        <!-- Back Button -->
        <button (click)="goBack()" class="back-btn btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <path d="m15 18-6-6 6-6" />
            </svg>
            Back to Login
        </button>

        <div class="auth-card glass">
            <div class="glass-filter"></div>
            <div class="glass-overlay"></div>
            <div class="glass-specular"></div>
            <div class="glass-content">
                <div class="auth-header">
                    <div class="auth-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                            <path d="m9 12 2 2 4-4" />
                        </svg>
                    </div>
                    <h2 class="auth-title">Verify Account</h2>
                    <p class="auth-subtitle">We sent a code to <span class="otp-email-highlight">{{ email }}</span></p>
                </div>

                <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="auth-form">
                    <div class="form-group otp-form-group">
                        <label>Enter 6-digit Code</label>
                        <div class="input-wrap otp-input-wrap">
                            <input formControlName="otp" type="text" maxlength="6" placeholder="------"
                                class="form-input otp-input">
                        </div>
                        @if (otpForm.get('otp')?.invalid && (otpForm.get('otp')?.touched || otpForm.get('otp')?.dirty))
                        {
                        <div class="form-error visible">Please enter a valid 6-digit code</div>
                        }
                    </div>

                    @if (errorMessage) {
                    <div class="otp-error-box">{{ errorMessage }}</div>
                    }

                    @if (successMessage) {
                    <div class="otp-success-box">{{ successMessage }}</div>
                    }

                    <button type="submit" [disabled]="otpForm.invalid || isLoading"
                        class="btn-primary btn-lg otp-submit" [style.opacity]="otpForm.invalid ? '0.6' : '1'">
                        {{ isLoading ? 'Verifying...' : 'Verify Email' }}
                    </button>
                </form>

                <div class="auth-toggle">
                    <span>Didn't receive the code? </span>
                    <button (click)="resendOtp()" [disabled]="isLoading" class="otp-resend-btn">Resend</button>
                </div>
            </div>
        </div>
    </div>
</section>
